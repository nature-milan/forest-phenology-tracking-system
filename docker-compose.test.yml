services:
  postgis_test:
    build:
      context: .
      dockerfile: Dockerfile.postgis-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fpts_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fpts_test"]
      interval: 2s
      timeout: 2s
      retries: 30
