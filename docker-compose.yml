services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.postgis
    volumes:
      - db_data:/var/lib/postgresql/data
    container_name: fpts-postgis
    environment:
      POSTGRES_DB: fpts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fpts"]
      interval: 2s
      timeout: 2s
      retries: 30
  redis:
    image: redis:7-alpine
    container_name: fpts-redis
    ports:
      - "6379:6379"
  seed_data:
    build: .
    container_name: fpts-seed-data
    user: "0:0"
    environment:
      DATA_DIR: /app/data
      ENVIRONMENT: production
      LOG_LEVEL: info
    volumes:
      - fpts_data:/app/data
    command:
      [
        "sh",
        "-c",
        "mkdir -p /app/data/raw && umask 022 && python -m fpts.scripts.make_synthetic_ndvi_stack",
      ]
    restart: "no"
  api:
    build: .
    container_name: fpts-api
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: info
      DATA_DIR: /app/data
      PHENOLOGY_REPO_BACKEND: postgis
      ENABLE_DEBUG_ROUTES: "false"
      DATABASE_DSN: postgresql://postgres:postgres@db:5432/fpts
      ENABLE_METRICS: "true"
      CACHE_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
    volumes:
      - fpts_data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      seed_data:
        condition: service_completed_successfully

volumes:
  db_data:
  fpts_data:
